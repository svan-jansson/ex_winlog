name: Build, Test & Publish
permissions:
  contents: write

on:
  push:
    branches: [master]
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    env:
      MIX_ENV: test

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

      - name: Static analysis
        run: mix credo

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == github.event.repository.default_branch

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2

      - name: Cache Mix dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Get version
        id: version
        run: |
          BASE=$(cat VERSION)
          BASE_COMMIT=$(git log -1 --format="%H" -- VERSION)
          HEIGHT=$(git rev-list --count "${BASE_COMMIT}..HEAD")
          VERSION="${BASE}.${HEIGHT}"
          sed -i "s/version: \"[^\"]*\"/version: \"${VERSION}\"/" mix.exs
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: release-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo 'notes<<RELEASE_NOTES_EOF'
            gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="v${{ steps.version.outputs.version }}" \
              --jq .body
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Publish to Hex.pm
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "${{ steps.release-notes.outputs.notes }}"
